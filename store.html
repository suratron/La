<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Shopify</title>
    <meta name="description" content="Pixel-perfect Shopify analytics dashboard simulator. Customize your store stats, send push notifications, and install as a PWA.">
    <meta name="keywords" content="shopify simulator, shopify dashboard, fake shopify app, shopify analytics, ecommerce simulator, shopify pwa, store dashboard">
    <meta name="author" content="larpify">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shopify">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Shopify">
    <link rel="canonical" href="https://larpify.pro/store">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://larpify.pro/store">
    <meta property="og:title" content="Shopify">
    <meta property="og:description" content="Pixel-perfect Shopify analytics dashboard simulator. Customize stats, send notifications, install as PWA.">
    <meta property="og:image" content="https://larpify.pro/images/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="larpify">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://larpify.pro/store">
    <meta name="twitter:title" content="Shopify">
    <meta name="twitter:description" content="Pixel-perfect Shopify analytics dashboard simulator. Customize stats, send notifications, install as PWA.">
    <meta name="twitter:image" content="https://larpify.pro/images/og-image.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/shopify_icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/shopify_icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/shopify_icon.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="appBody">

    <!-- ============================================================
         SETTINGS  (tap the teal logo tile to open)
         ============================================================ -->
    <div id="settingsPage" class="settings-page">
        <div class="settings-header">
            <button id="closeSettings" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <h1>Store settings</h1>
            <div style="width:36px;"></div>
        </div>
        <div class="settings-content">

            <div class="settings-section">
                <h2 class="settings-section-title">STORE</h2>
                <div class="settings-field">
                    <label>Store name</label>
                    <input id="cfgStoreName" type="text" placeholder="larpify">
                </div>
                <div class="settings-field">
                    <label>Logo text</label>
                    <input id="cfgLogoText" type="text" placeholder="lar" maxlength="4">
                </div>
                <div class="settings-field">
                    <label>Avatar initials</label>
                    <input id="cfgAvatar" type="text" placeholder="EC" maxlength="3">
                </div>
            </div>

            <div class="settings-section">
                <h2 class="settings-section-title">STATS</h2>
                <div class="settings-field">
                    <label>Total sales ($)</label>
                    <input id="cfgSales" type="text" placeholder="1,169.61">
                </div>
                <div class="settings-field">
                    <label>Gross sales ($)</label>
                    <input id="cfgGross" type="text" placeholder="1,254.50">
                </div>
                <div class="settings-field">
                    <label>Orders</label>
                    <input id="cfgOrders" type="text" placeholder="2">
                </div>
                <div class="settings-field">
                    <label>Conversion rate (%)</label>
                    <input id="cfgConv" type="text" placeholder="0">
                </div>
                <div class="settings-field">
                    <label>Active visitors on site</label>
                    <input id="cfgVisitors" type="text" placeholder="0">
                </div>
                <div class="settings-field">
                    <label>Orders to fulfill</label>
                    <input id="cfgFulfill" type="text" placeholder="2">
                </div>
                <div class="settings-field">
                    <label>Payments to capture</label>
                    <input id="cfgPayments" type="text" placeholder="1">
                </div>
            </div>

            <div class="settings-section">
                <h2 class="settings-section-title">CHART</h2>
                <div class="settings-field">
                    <label>Period</label>
                    <select id="cfgPeriod">
                        <option value="12h">Last 12 hours</option>
                        <option value="today">Today</option>
                        <option value="7d">Last 7 days</option>
                        <option value="30d">Last 30 days</option>
                        <option value="90d">Last 90 days</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h2 class="settings-section-title">PUSH NOTIFICATION</h2>
                <div class="settings-field">
                    <label>Store name</label>
                    <input id="notifStore" type="text" placeholder="HoH Fashion">
                </div>
                <div class="settings-field">
                    <label>Number of items</label>
                    <input id="notifItems" type="number" placeholder="2" min="1">
                </div>
                <div class="settings-field">
                    <label>Total amount ($)</label>
                    <input id="notifAmount" type="text" placeholder="70.49">
                </div>
                <div class="settings-field">
                    <label>Number of notifications</label>
                    <input id="notifCount" type="number" placeholder="3" min="1" max="50">
                </div>
                <div class="settings-field">
                    <label>Speed</label>
                    <div class="speed-toggle">
                        <button class="speed-btn active" data-speed="fast">Fast</button>
                        <button class="speed-btn" data-speed="medium">Medium</button>
                        <button class="speed-btn" data-speed="slow">Slow</button>
                    </div>
                </div>
                <div class="settings-field" id="mediumField" style="display:none">
                    <label>Medium interval (seconds)</label>
                    <input id="notifMedium" type="number" placeholder="3" min="1" max="30" step="0.5">
                </div>
                <div class="settings-field" id="slowField" style="display:none">
                    <label>Slow interval (seconds)</label>
                    <input id="notifSlow" type="number" placeholder="10" min="1" max="120" step="1">
                </div>
                <button id="pushNotif" class="push-btn">Send notification</button>
            </div>

            <button id="saveSettings" class="save-btn">Save</button>
        </div>
    </div>

    <!-- ============================================================
         MAIN APP
         ============================================================ -->
    <div id="mainPage">

        <!-- Black header bar -->
        <header class="app-header">
            <div class="header-left">
                <button id="openSettings" class="logo-tile" aria-label="Settings">
                    <span id="logoText">lar</span>
                </button>
                <span id="storeNameDisplay" class="store-name">larpify</span>
            </div>
            <div class="header-right">
                <button class="bell-btn" aria-label="Notifications">
                    <svg viewBox="0 0 18 18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" d="m5.252 12.424-2.446-.281c-1.855-.213-2.38-2.659-.778-3.616l.065-.038a2.89 2.89 0 0 0 1.407-2.48v-.509a4.5 4.5 0 0 1 9 0v.51c0 1.016.535 1.958 1.40[...]</path>
                    </svg>
                </button>
                <div class="avatar-circle">
                    <span id="avatarInitials">EC</span>
                </div>
            </div>
        </header>

         <!-- Randomizer Button -->
         <div id="randomizerContainer">
              <button id="randomizeValues" class="randomizer-btn">Randomize Values</button>
         </div>

    </div>
</div>
<script src="./wallet.js"></script>
</body>
</html>
